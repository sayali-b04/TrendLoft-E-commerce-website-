<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>help-center</title>
 
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: #f5f5f5;
}

.help-center {
    width: 90%;
    max-width: 700px;
    background-color: #ffffff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

header {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

header h1 {
    color: #211e20;
    font-size: 24px;
}

header input[type="search"] {
    padding: 8px;
    font-size: 14px;
    width: 50%;
    border: 1px solid #ddd;
    border-radius: 4px;
}

.breadcrumb {
    margin-top: 10px;
    font-size: 14px;
    color: #8a8080;
}

.breadcrumb a {
    color: #989595;
    text-decoration: none;
}

.breadcrumb a:hover {
    color: #ff007f;
}

.faq-content h2 {
    font-size: 20px;
    color: #6e6868;
    margin: 20px 0 10px;
}

.faq-content p {
    font-size: 16px;
    color: #555;
    line-height: 1.5;
}

.feedback-section {
    margin-top: 20px;
    padding: 15px;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.feedback-section p {
    margin-right: auto;
    font-size: 16px;
    color: #333;
}

.feedback-btn {
    background: none;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 8px 10px;
    font-size: 16px;
    cursor: pointer;
}

.feedback-btn.like:hover {
    border-color: green;
    color: green;
}

.feedback-btn.dislike:hover {
    border-color: red;
    color: red;
}

.like-count {
    font-size: 16px;
    color: #666;
}

        </style>
</head>
<body>
    <div class="help-center">
        <header>
            <h1>Help Center</h1>
            <input type="search" placeholder="How can we help you?">
        </header>
        </nav>
        <div class="faq-content">
            <h2>How do I check the available balance or expiry date on my Gift Card?</h2>
            <p>To check Gift Card balance, click on Gift Card section on Trend Loft then, enter 16 digit card no. and 6 digit pin.</p>
        </div>
        <div class="feedback-section">
            <p>Was this helpful?</p>
            <button class="feedback-btn like">👍</button>
            <button class="feedback-btn dislike">👎</button>
            <span class="like-count">0</span>
        </div>
    </div>
</body>
</html>
