<!DOCTYPE html>
<html lang="en">

<head>
    <title>Sign Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #ffffff, #f6e9f7);
        }

        .container {
            background-color: whitesmoke;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
            width: 30%;
            height: 80%;
        }

        .container h2 {
            color: black;
            margin-bottom: 20px;
        }

        /* Input fields */
        .container input[type="text"],
        .container input[type="email"],
        .container input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
            outline: none;
        }

        /* Password suggestion link */
        .suggestion-link {
            font-size: 0.9em;
            color:rgb(86, 85, 85);
            text-decoration: none;
        }

        .suggestion-link:hover {
            text-decoration: underline;
            color: #8B0000;
        }

        /* Buttons */
        .btn-field {
            width: 100%;
            display: flex;
            justify-content: space-between;
        }

        .btn-field button {
            flex-basis: 40%;
            background: rgb(19, 19, 19);
            color: white;
            height: 40px;
            border-radius: 20px;
            margin-top: 30px;
            border: 0;
            outline: 0;
            cursor: pointer;
            transition: background 1s;
        }

        .container button:hover {
            background-color: #aaa;
        }

        .container button a{
            text-decoration: none;
            color: white;
        }

    </style>
</head>

<body>
    <div class="container">
        <h2>Sign Up</h2>
        <form id="signupForm" onsubmit="return validateForm()">
            <input type="text" id="username" placeholder="Username" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <a href="#" class="suggestion-link" onclick="showPasswordSuggestion()">Password Suggestions Click Here!</a>
            <div class="btn-field">
                <button type="submit">Sign Up</button>
                <button type="button" onclick="signIn()" class="signIn">  
                    <a href="C:\Users\Administrator\OneDrive\Project\SignIn.html" target="_top">
                        Sign In </a></button>
            </div>
        </form>
    </div>

    <script>
        function validateForm() {
            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            // Username validation
            if (username.length < 3) {
                alert("Username must be at least 3 characters long.");
                return false;
            }

            // Email validation
            const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
            if (!email.match(emailPattern)) {
                alert("Please enter a valid email address.");
                return false;
            }

            // Password validation
            if (password.length < 6) {
                alert("Password must be at least 6 characters long.");
                return false;
            }

            alert("Form submitted successfully!");
            return true;
        }

        function showPasswordSuggestion() {
            alert("Use a mix of letters, numbers, and symbols for a strong password.");
        }

        function signIn() {
            alert("Redirecting to sign-in page...");
        }
    </script>
</body>

</html>
